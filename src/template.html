<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root {
    --ice-50: #f4f9fc;
    --ice-100: #e4eef5;
    --ice-300: #a9c7db;
    --steel-700: #2c3e4a;
    --steel-900: #16232b;
    --frost-accent: #4fa3c7;
    --crack-line: #c7dbe6;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: linear-gradient(180deg, var(--ice-50) 0%, var(--ice-100) 100%);
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--steel-900);
    min-height: 100vh;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 56px 24px 72px;
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--frost-accent);
    font-weight: 700;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 28px;
    line-height: 1.25;
    margin: 0 0 8px;
    color: var(--steel-900);
    font-weight: 800;
  }

  .sub {
    font-size: 15px;
    color: var(--steel-700);
    margin: 0 0 40px;
    line-height: 1.5;
  }

  .list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  a.lang {
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    background: #ffffff;
    border: 1px solid var(--crack-line);
    border-radius: 10px;
    padding: 16px 18px;
    color: var(--steel-900);
    transition: border-color 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
    box-shadow: 0 1px 2px rgba(22, 35, 43, 0.04);
  }

  a.lang:hover, a.lang:focus-visible {
    border-color: var(--frost-accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(79, 163, 199, 0.18);
  }

  a.lang:focus-visible {
    outline: 2px solid var(--frost-accent);
    outline-offset: 2px;
  }

  .native {
    font-size: 16px;
    font-weight: 700;
  }

  .action {
    font-size: 13px;
    color: var(--steel-700);
    font-weight: 400;
  }

  .arrow {
    color: var(--frost-accent);
    font-size: 18px;
    margin-left: 12px;
    flex-shrink: 0;
  }

  .foot {
    margin-top: 40px;
    font-size: 12px;
    color: #7f97a2;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">{{EYEBROW}}</div>
    <h1>{{HEADING}}</h1>
    <p class="sub">{{SUBHEADING}}</p>

    <div class="list">{{LANGUAGE_LINKS}}
    </div>

    <div class="foot">{{FOOTER_NOTE}}<br>For the original form, visit {{FORM_SHORT_URL}} directly.</div>
  </div>
</body>
</html>
